<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions de Compétence IA-DAS avec Requêtes SPARQL</title>
    <style>
        body {
            font-family: 'Times New Roman', serif;
            line-height: 1.6;
            color: #333;
            max-width: 21cm;
            margin: 0 auto;
            padding: 2cm;
            background: white;
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
        }

        h2 {
            color: #34495e;
            font-size: 20px;
            margin-top: 40px;
            margin-bottom: 20px;
            border-left: 4px solid #3498db;
            padding-left: 15px;
        }

        h3 {
            color: #2c3e50;
            font-size: 16px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        h4 {
            color: #34495e;
            font-size: 14px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        p {
            text-align: justify;
            margin-bottom: 12px;
            line-height: 1.7;
        }

        .meta-info {
            background-color: #f8f9fa;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .meta-info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .warning-box {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .info-box {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .success-box {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        .phase {
            margin-bottom: 40px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            background: white;
        }

        .question-group {
            margin-bottom: 30px;
            border-left: 4px solid #3498db;
            padding-left: 20px;
            background: #f8f9fc;
            border-radius: 0 5px 5px 0;
            padding: 15px 20px;
        }

        .question {
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .sparql-container {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }

        .sparql-header {
            background: #e9ecef;
            color: #495057;
            padding: 10px 15px;
            font-size: 12px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .sparql-header:hover {
            background: #dee2e6;
        }

        .sparql-code {
            background: #f8f9fa;
            color: #495057;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            overflow-x: auto;
            white-space: pre;
            max-height: 0;
            transition: max-height 0.3s ease-out;
            overflow: hidden;
            border: 1px solid #dee2e6;
        }

        .sparql-code.expanded {
            max-height: 500px;
            overflow-x: auto;
            overflow-y: auto;
        }

        .toggle-icon {
            transition: transform 0.3s ease;
            margin-left: 10px;
        }

        .toggle-icon.expanded {
            transform: rotate(180deg);
        }

        .copy-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            transition: background 0.3s;
            margin-right: 10px;
        }

        .copy-btn:hover {
            background: #2980b9;
        }

        .navigation {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .nav-link {
            display: inline-block;
            margin: 5px 10px 5px 0;
            padding: 8px 15px;
            background: white;
            color: #495057;
            text-decoration: none;
            border: 1px solid #dee2e6;
            border-radius: 3px;
            transition: all 0.3s;
            font-size: 12px;
        }

        .nav-link:hover {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }

        .highlight {
            background-color: #fff3cd;
            padding: 2px 4px;
            border-radius: 3px;
        }

        .alert {
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid;
        }

        .alert-warning {
            background-color: #fff3cd;
            border-color: #ffeaa7;
            color: #856404;
        }

        .alert-info {
            background-color: #d1ecf1;
            border-color: #bee5eb;
            color: #0c5460;
        }

        .keyword {
            color: #8e44ad;
            font-weight: bold;
        }

        .string {
            color: #27ae60;
        }

        .comment {
            color: #7f8c8d;
            font-style: italic;
        }

        .variable {
            color: #e74c3c;
        }

        .uri {
            color: #3498db;
        }

        ul, ol {
            margin-bottom: 15px;
            padding-left: 30px;
        }

        li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            body {
                padding: 1cm;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .sparql-code {
                font-size: 10px;
            }
        }

        @media print {
            body {
                margin: 0;
                padding: 1cm;
            }

            .sparql-container {
                page-break-inside: avoid;
            }

            h2 {
                page-break-before: always;
            }

            h2:first-of-type {
                page-break-before: avoid;
            }
        }
    </style>
